name: Build & Release (verified contracts)

# Reproducible builds of the Tanur Soroban contracts via stellar-expert's workflow.
# On a version tag, this builds each contract in a pinned container, attaches the
# WASM to a GitHub Release, and produces a build attestation. StellarExpert then
# links the on-chain contract (matching WASM hash) to this source commit → "verified".
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  vault:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: tanur-vault-${{ github.ref_name }}
      release_description: 'TanurVault — verified reproducible build'
      relative_path: '["contracts/tanur-vault"]'
      package: 'tanur-vault'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}

  yield:
    uses: stellar-expert/soroban-build-workflow/.github/workflows/release.yml@main
    with:
      release_name: tanur-yield-${{ github.ref_name }}
      release_description: 'TanurYield — verified reproducible build'
      relative_path: '["contracts/tanur-yield"]'
      package: 'tanur-yield'
    secrets:
      release_token: ${{ secrets.GITHUB_TOKEN }}
